<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Brain — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   V-BRAIN — LIGHT DESIGN SYSTEM
   Light surfaces + selective teal-to-green gradient accents
   ========================================================================== */
:root{
  --teal-black:#021E24;--teal-deep:#03272E;--teal-dark:#00363D;--teal-mid:#0F515C;
  --teal:#0C7878;--accent:#00A189;--green-light:#A9FDAC;--green-accent:#00E08E;
  --grey:#939196;--offwhite:#F7F3F5;
  /* Light palette */
  --bg:#F9FAFB;--surface:#FFFFFF;--surface-2:#F3F5F7;--surface-3:#EDF0F3;
  --border:#E2E6EB;--border-light:#EEF1F4;
  --text:#1A2B33;--text-2:#4A5C68;--text-3:#7A8D99;--text-4:#A3B1BC;
  /* Gradients */
  --grad-hero:linear-gradient(135deg,#00363D 0%,#0F515C 40%,#0C7878 70%,#00A189 100%);
  --grad-accent:linear-gradient(135deg,var(--teal-mid),var(--accent),var(--green-light));
  --grad-card:linear-gradient(160deg,rgba(15,81,92,.03) 0%,rgba(0,161,137,.015) 100%);
  --grad-bar:linear-gradient(90deg,var(--teal-mid),var(--accent),var(--green-light));
  --grad-subtle:linear-gradient(135deg,rgba(0,54,61,.04),rgba(0,161,137,.02));
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,54,61,.06);--shadow-md:0 4px 16px rgba(0,54,61,.08);--shadow-lg:0 12px 40px rgba(0,54,61,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;animation:fadeIn .3s ease;min-height:100vh}.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(169,253,172,.6)}50%{box-shadow:0 0 4px rgba(169,253,172,.3)}}

/* NAV — gradient header bar */
.topnav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:13px 28px;background:var(--grad-hero);border-bottom:none;box-shadow:0 2px 20px rgba(0,54,61,.15)}
.topnav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;letter-spacing:-.02em;cursor:pointer;color:#fff}
.topnav-logo .v{color:var(--green-light)}
.brain-dot{width:8px;height:8px;border-radius:50%;background:var(--green-light);animation:pulse 2.5s infinite}
.topnav-right{display:flex;align-items:center;gap:14px}
.notif-btn{position:relative;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.7);transition:all .2s}
.notif-btn:hover{border-color:var(--green-light);color:var(--green-light);background:rgba(255,255,255,.12)}
.notif-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--green-accent);color:var(--teal-black);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--teal-black);cursor:pointer}

/* LAYOUT */
.shell{max-width:1120px;margin:0 auto;padding:28px 28px 60px}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--text-4);margin-bottom:14px}

/* SEARCH */
.dash-topbar{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.search-bar{flex:1;display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:40px;transition:all .2s;box-shadow:var(--shadow-sm)}
.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,161,137,.1)}
.search-bar svg{color:var(--text-4);flex-shrink:0}
.search-bar input{flex:1;border:none;outline:none;background:0 0;font-family:inherit;font-size:14px;color:var(--text)}
.search-bar input::placeholder{color:var(--text-4)}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all .2s;box-shadow:var(--shadow-sm);position:relative}
.icon-btn:hover{border-color:var(--accent);color:var(--teal-mid);background:var(--surface)}
.add-btn{padding:0 18px;gap:6px;border-radius:40px;background:var(--grad-hero);border:none;color:#fff;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;height:42px;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(0,54,61,.2)}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,54,61,.25)}

/* PROJECT CARDS */
.p-card{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);margin-bottom:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.p-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;background:var(--grad-bar);opacity:0;transition:opacity .25s}
.p-card:hover{border-color:var(--border);box-shadow:var(--shadow-md);transform:translateX(4px)}
.p-card:hover::before{opacity:1}
.p-card:hover .p-arrow{color:var(--accent);transform:translateX(3px)}
.p-card.archived{opacity:.6}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.badge-active{background:rgba(0,161,137,.08);color:var(--accent)}
.badge-winding{background:rgba(217,163,21,.08);color:#B8860B}
.badge-flagged{background:rgba(220,80,80,.08);color:#C0392B}
.badge-completed{background:rgba(0,54,61,.06);color:var(--text-3)}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.p-info{flex:1;min-width:0}
.p-name{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:5px;color:var(--text)}
.p-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--text-3);margin-bottom:7px}
.p-meta b{color:var(--text-2);font-weight:500}
.p-desc{font-size:13px;line-height:1.55;color:var(--text-4);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.p-updated{font-size:10px;color:var(--text-4)}
.p-arrow{color:var(--text-4);transition:all .25s}

/* SUITE */
.suite-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:32px}
.suite-tile{aspect-ratio:1.4;border-radius:var(--r-lg);border:1px solid var(--border-light);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .3s;position:relative;box-shadow:var(--shadow-sm)}
.suite-tile.on{border-color:var(--accent);background:linear-gradient(160deg,rgba(0,161,137,.04),rgba(169,253,172,.02))}
.suite-tile.on:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.suite-tile.off{opacity:.4;pointer-events:none}
.s-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.suite-tile.on .s-icon{background:rgba(0,161,137,.1);color:var(--accent)}
.suite-tile.off .s-icon{background:var(--surface-3);color:var(--text-4)}
.s-name{font-size:13px;font-weight:600}
.suite-tile.on .s-name{color:var(--teal-mid)}
.suite-tile.off .s-name{color:var(--text-3)}
.s-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;background:var(--surface-3);color:var(--text-4)}

/* BACK BTN + HEADERS */
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.hdr-title{font-size:24px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.hdr-sub{font-size:14px;color:var(--text-3);margin-bottom:24px;padding-left:50px}

/* TABS */
.tab-bar{display:flex;gap:4px;padding:4px;background:var(--surface-2);border-radius:40px;border:1px solid var(--border-light);margin-bottom:28px;overflow-x:auto}
.tab{padding:10px 20px;border-radius:36px;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.on{background:var(--surface);color:var(--teal-mid);font-weight:600;box-shadow:var(--shadow-sm)}
.tc{display:none;animation:slideUp .3s ease}.tc.on{display:block}

/* TIMELINE */
.tl-filters{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);cursor:pointer;transition:all .2s}
.chip:hover{border-color:var(--accent);color:var(--teal-mid)}
.chip.on{border-color:var(--accent);color:var(--surface);background:var(--teal-mid)}
.tl-item{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--border-light)}
.tl-date{width:70px;flex-shrink:0;font-size:11px;color:var(--text-4);padding-top:3px;text-align:right}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:5px}
.tl-line{width:1px;flex:1;background:var(--border-light);margin-top:6px}
.dot-decision{background:var(--accent);box-shadow:0 0 6px rgba(0,161,137,.3)}
.dot-milestone{background:#3B82F6;box-shadow:0 0 6px rgba(59,130,246,.3)}
.dot-risk{background:#EF4444;box-shadow:0 0 6px rgba(239,68,68,.3)}
.dot-update{background:var(--text-4)}
.dot-personnel{background:#8B5CF6;box-shadow:0 0 6px rgba(139,92,246,.3)}
.tl-body{flex:1;min-width:0}
.tl-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.tag-decision{background:rgba(0,161,137,.08);color:var(--accent)}
.tag-milestone{background:rgba(59,130,246,.08);color:#3B82F6}
.tag-risk{background:rgba(239,68,68,.08);color:#EF4444}
.tag-update{background:var(--surface-3);color:var(--text-3)}
.tag-personnel{background:rgba(139,92,246,.08);color:#8B5CF6}
.tl-title{font-size:14px;font-weight:600;color:var(--text)}
.tl-desc{font-size:13px;line-height:1.5;color:var(--text-2)}
.tl-source{font-size:11px;color:var(--text-4);margin-top:6px;font-style:italic}

/* BRIEFING */
.brief{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden;transition:all .2s;box-shadow:var(--shadow-sm)}
.brief:hover{border-color:var(--border)}
.brief-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;cursor:pointer}
.brief-left{display:flex;align-items:center;gap:12px}
.brief-num{width:28px;height:28px;border-radius:50%;background:var(--grad-hero);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.brief-t{font-size:15px;font-weight:600;color:var(--text)}
.brief-st{font-size:12px;color:var(--text-4);margin-top:1px}
.brief-chev{color:var(--text-4);transition:transform .25s}
.brief.open .brief-chev{transform:rotate(180deg)}
.brief-bd{max-height:0;overflow:hidden;transition:max-height .35s ease}
.brief.open .brief-bd{max-height:600px}
.brief-inner{padding:0 22px 22px}

/* SKELETON */
.sk{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--surface-3) 0%,var(--border-light) 50%,var(--surface-3) 100%);background-size:400px 12px;animation:shimmer 1.8s infinite linear;margin-bottom:10px}
.sk:last-child{margin-bottom:0}
.sk.w100{width:100%}.sk.w90{width:90%}.sk.w80{width:80%}.sk.w70{width:70%}.sk.w60{width:60%}.sk.w40{width:40%}
.sk.h20{height:20px;margin-bottom:14px}

/* HEALTH */
.h-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.h-card{padding:20px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.h-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4);margin-bottom:14px}
.h-bar-t{height:6px;border-radius:3px;background:var(--surface-3);margin-bottom:8px;overflow:hidden}
.h-bar-f{height:100%;border-radius:3px}
.h-val{font-size:24px;font-weight:700;letter-spacing:-.03em}
.h-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.h-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.h-drow{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.h-dl{color:var(--text-4)}.h-dv{color:var(--text-2);font-weight:500}

/* STAKEHOLDERS */
.st-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.st-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4);margin-bottom:12px}
.st-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);margin-bottom:8px}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal-mid),var(--teal));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:#fff}
.av-accent{background:linear-gradient(135deg,var(--accent),var(--green-accent))!important}
.av-blue{background:linear-gradient(135deg,#4a6fa5,#3B82F6)!important}
.st-name{font-size:13px;font-weight:600;color:var(--text)}
.st-role{font-size:11px;color:var(--text-4)}

/* V-ALLOCATE */
.al-card{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 18px 26px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);margin-bottom:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.al-card:hover{border-color:var(--border);box-shadow:var(--shadow-md);transform:translateX(4px)}
.al-bar{width:3px;height:100%;position:absolute;left:0;top:0;background:var(--grad-bar)}
.al-name{font-size:15px;font-weight:600;color:var(--text)}
.al-needs{font-size:12px;color:var(--text-3);margin-top:2px}
.al-right{display:flex;align-items:center;gap:14px}
.al-deadline{font-size:11px;font-weight:600;color:var(--text-3)}
.al-count{padding:4px 12px;border-radius:20px;background:rgba(239,68,68,.08);color:#EF4444;font-size:11px;font-weight:700}

/* FORECAST */
.f-toggle{display:flex;gap:2px;padding:3px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:30px}
.f-btn{padding:7px 16px;border-radius:26px;font-size:11px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all .2s}
.f-btn:hover{color:var(--text)}.f-btn.on{background:var(--surface);color:var(--teal-mid);box-shadow:var(--shadow-sm)}
.f-view{display:none;animation:slideUp .3s ease}.f-view.on{display:block}
.cap-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.cap-lbl{width:80px;font-size:11px;color:var(--text-4);text-align:right;flex-shrink:0}
.cap-trk{flex:1;height:26px;border-radius:5px;background:var(--surface-3);position:relative;overflow:hidden}
.cap-supply{height:100%;border-radius:5px;background:var(--grad-accent);position:absolute;left:0;top:0;opacity:.7}
.cap-demand{height:100%;border-radius:5px;background:rgba(239,68,68,.15);border-right:2px dashed #EF4444;position:absolute;left:0;top:0}
.cap-num{width:50px;font-size:11px;font-weight:600;color:var(--text-3);text-align:right;flex-shrink:0}
.fh-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.fh-lbl{width:55px;font-size:11px;color:var(--text-4);text-align:right;flex-shrink:0}
.fh-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.fh-bar{height:14px;border-radius:3px;position:relative}
.fh-bar span{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:9px;color:#fff;white-space:nowrap;opacity:.9}
.fh-fc{background:var(--accent)}.fh-ac{background:var(--teal-mid)}
.fh-d{font-size:12px;font-weight:700;width:28px;text-align:center;flex-shrink:0}
.fh-neg{color:#EF4444}.fh-pos{color:var(--accent)}.fh-ok{color:var(--text-4)}

/* ALLOC TABLE */
.at-hd{display:grid;grid-template-columns:1.5fr 2fr 1.2fr .7fr .8fr;padding:12px 18px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4)}
.at-row{display:grid;grid-template-columns:1.5fr 2fr 1.2fr .7fr .8fr;padding:14px 18px;border-bottom:1px solid var(--border-light);font-size:13px;color:var(--text-2);align-items:center;cursor:pointer;transition:background .2s}
.at-row:hover{background:var(--surface-2)}
.at-name{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--text)}
.at-proj{font-size:12px}.at-role{font-size:12px;color:var(--text-3)}.at-date{font-size:12px;color:var(--text-3)}
.free{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.free-now{background:rgba(0,161,137,.1);color:var(--accent)}
.free-soon{background:rgba(0,161,137,.06);color:var(--teal)}
.free-weeks{background:var(--surface-3);color:var(--text-3)}

/* PANELS (allocate detail) */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:22px;max-height:calc(100vh - 260px);overflow-y:auto;box-shadow:var(--shadow-sm)}
.panel-t{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-4);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border-light)}
.rr{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border-light)}
.rr-l{font-size:12px;color:var(--text-4)}.rr-v{font-size:13px;font-weight:500;text-align:right;color:var(--text)}
.stag{display:inline-block;padding:3px 10px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text-2);margin:2px 3px}

/* CONSULTANT CARD */
.cc{padding:16px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);margin-bottom:10px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.cc:hover{border-color:var(--border);box-shadow:var(--shadow-md)}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cc-nr{display:flex;align-items:center;gap:10px}
.cc-name{font-size:14px;font-weight:600;color:var(--text)}
.cc-stat{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.cc-avail{background:rgba(0,161,137,.1);color:var(--accent)}
.cc-ending{background:rgba(217,163,21,.08);color:#B8860B}
.cc-fit{font-size:22px;font-weight:700;letter-spacing:-.02em}
.fit-hi{color:var(--accent)}.fit-md{color:#B8860B}
.fb-t{height:4px;border-radius:2px;background:var(--surface-3);margin-bottom:10px}
.fb-f{height:100%;border-radius:2px;background:var(--accent)}

      // Sort: title matches first, then description matches
      const entries=Object.entries(DATA.projects);
      if(query){entries.sort(([,a],[,b])=>{const aT=a.name.toLowerCase().includes(query)?0:1;const bT=b.name.toLowerCase().includes(query)?0:1;return aT-bT})}
      entries.forEach(([pid,p])=>{if(query&&!p.name.toLowerCase().includes(query)&&!p.desc.toLowerCase().includes(query))return;found=true;
        const card=document.createElement('div');card.className='p-card';card.onclick=go('project',{project:pid});

        list.appendChild(card)});
      if(!found)list.innerHTML='<div style="padding:40px;text-align:center;color:var(--text-4)">No projects match your search.</div>'}
    drawProjects('');document.getElementById('dashQ').oninput=(e)=>drawProjects(e.target.value)},0);

    h+=`<div class="form-group"><label class="form-label">Client</label><input class="form-input" id="np-client" placeholder="e.g. Atlas Bank" value="${np.client||''}"></div>`;
    h+=`<div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="np-desc" placeholder="Brief description of project scope and objectives…">${np.desc||''}</textarea></div>`;
    h+=`<div class="form-row"><div class="form-group"><label class="form-label">Status</label><select class="form-input" id="np-status"><option value="active"${np.status==='active'?' selected':''}>Active</option><option value="winding"${np.status==='winding'?' selected':''}>Winding Down</option></select></div><div class="form-group"><label class="form-label">Start Date</label><input class="form-input" id="np-start" type="month" value="${np.start||'2026-06'}"></div></div>`;
  } else if(step===1){
    h+=`<div class="form-group"><label class="form-label">Partner (Engagement Lead)</label><select class="form-input" id="np-partner"><option value="">Select partner…</option>${['Priscila B.','Jonathan K.','Winsome C.','Carol M.'].map(p=>`<option${np.partner===p?' selected':''}>${p}</option>`).join('')}</select><div class="form-hint">Partner must approve the engagement before it goes live</div></div>`;
    h+=`<div class="form-group"><label class="form-label">QA (Delivery Oversight)</label><select class="form-input" id="np-qa"><option value="">Select QA…</option>${['Monique V.','Jonathan K.','Winsome C.','Priscila B.','Carol M.'].map(q=>`<option${np.qa===q?' selected':''}>${q}</option>`).join('')}</select></div>`;
    h+=`<div class="form-group"><label class="form-label">Approval Status</label><div style="padding:12px 16px;background:rgba(217,163,21,.06);border:1px solid rgba(217,163,21,.15);border-radius:var(--r-sm);font-size:12px;color:#B8860B">⏳ Partner approval will be requested upon submission. The project will be created in <strong>draft</strong> state until approved.</div></div>`;
  } else if(step===2){
    h+=`<div class="form-group"><label class="form-label">Project Context Files</label><div class="upload-zone" id="uploadZone">${ICO.upload}<div style="margin-top:8px;font-size:13px;font-weight:500">Drop files here or click to browse</div><div style="font-size:11px;color:var(--text-4);margin-top:4px">SOW, proposals, client briefs, data schemas, meeting notes…</div></div><div class="form-hint">V-Brain will ingest these to generate project context, timeline, and health signals</div></div>`;
    const files=np.files||[];if(files.length){h+=`<div style="margin-top:10px">${files.map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface-2);border-radius:var(--r-sm);margin-bottom:6px"><span style="font-size:12px;color:var(--text-2)">${f}</span><span style="font-size:10px;color:var(--text-4);margin-left:auto">Ready</span></div>`).join('')}</div>`}
  } else if(step===3){
    h+=`<div class="form-group"><label class="form-label">Team Size Needed</label><input class="form-input" id="np-teamsize" type="number" min="1" max="20" placeholder="e.g. 3" value="${np.teamSize||''}"></div>`;
    h+=`<div class="form-group"><label class="form-label">Key Skills Required</label><div class="skill-input-row"><input class="form-input" id="np-skillin" placeholder="e.g. Snowflake, Python, Process Mapping…"><button id="addSkillBtn">+</button></div><div class="skill-tags" id="skillTags">${(np.skills||[]).map((sk,i)=>`<span class="skill-tag-rm">${sk}<span class="x" data-ski="${i}">×</span></span>`).join('')}</div></div>`;
    h+=`<div class="form-row"><div class="form-group"><label class="form-label">Seniority Mix</label><select class="form-input" id="np-seniority"><option value="">Select…</option><option${np.seniority==='Senior-heavy'?' selected':''}>Senior-heavy</option><option${np.seniority==='Mixed'?' selected':''}>Mixed</option><option${np.seniority==='Junior-ok'?' selected':''}>Junior-ok</option></select></div><div class="form-group"><label class="form-label">Preferred Persona</label><input class="form-input" id="np-persona" placeholder="e.g. autonomous, client-facing" value="${np.persona||''}"></div></div>`;
    h+=`<div class="form-group"><label class="form-label">Additional Notes for V-Allocate</label><textarea class="form-input" id="np-allocnotes" placeholder="Any specific requirements, travel needs, client preferences…">${np.allocNotes||''}</textarea></div>`;
  } else if(step===4){
    h+=`<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px">Review your project before creating</div>`;
    const rows=[{l:'Project',v:np.name||'—'},{l:'Client',v:np.client||'—'},{l:'Description',v:np.desc||'—'},{l:'Status',v:np.status||'active'},{l:'Start',v:np.start||'—'},{l:'Partner',v:np.partner||'—'},{l:'QA',v:np.qa||'—'},{l:'Files',v:(np.files||[]).length+' uploaded'},{l:'Team Size',v:np.teamSize||'—'},{l:'Skills',v:(np.skills||[]).join(', ')||'—'},{l:'Seniority',v:np.seniority||'—'},{l:'Persona',v:np.persona||'—'}];
    h+=`<div style="background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--r-md);padding:18px 20px">${rows.map(r=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:13px"><span style="color:var(--text-3)">${r.l}</span><span style="color:var(--text);font-weight:500;text-align:right;max-width:60%">${r.v}</span></div>`).join('')}</div>`;
    h+=`<div style="margin-top:14px;padding:12px 16px;background:rgba(0,161,137,.04);border:1px solid rgba(0,161,137,.1);border-radius:var(--r-sm);font-size:12px;color:var(--text-2)">✅ On creation, V-Brain will begin ingesting uploaded files, building the project timeline, and generating health signals. Partner approval will be requested from <strong>${np.partner||'—'}</strong>.</div>`;
  }
  h+='</div>';
  // Footer
  const isFirst=step===0,isLast=step===4;
  h+=`<div class="modal-footer">${!isFirst?'<button class="btn-secondary" id="wizPrev">← Back</button>':''}<button class="btn-primary" id="wizNext">${isLast?'Create Project':'Next →'}</button></div></div>`;
  d.innerHTML=h;

  setTimeout(()=>{
    d.querySelector('#wizClose').onclick=()=>{state.newProjOpen=false;render()};
    d.onclick=(e)=>{if(e.target===d){state.newProjOpen=false;render()}};
    const prev=d.querySelector('#wizPrev'),next=d.querySelector('#wizNext');
    function saveStep(){
      if(step===0){np.name=d.querySelector('#np-name')?.value;np.client=d.querySelector('#np-client')?.value;np.desc=d.querySelector('#np-desc')?.value;np.status=d.querySelector('#np-status')?.value;np.start=d.querySelector('#np-start')?.value}
      if(step===1){np.partner=d.querySelector('#np-partner')?.value;np.qa=d.querySelector('#np-qa')?.value}
      if(step===2){/* files already tracked */}
      if(step===3){np.teamSize=d.querySelector('#np-teamsize')?.value;np.seniority=d.querySelector('#np-seniority')?.value;np.persona=d.querySelector('#np-persona')?.value;np.allocNotes=d.querySelector('#np-allocnotes')?.value}
      state.newProjData=np;
    }
    if(prev)prev.onclick=()=>{saveStep();state.newProjStep=step-1;render()};
    if(next)next.onclick=()=>{saveStep();
      if(isLast){
        // Create the project
        const pid=np.name?np.name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,12):'proj'+Date.now();
        const fmt=np.start?new Date(np.start+'T00:00').toLocaleDateString('en',{month:'short',year:'numeric'}):'Jun 2026';
        DATA.projects[pid]={
          name:np.name||'New Project',status:np.status||'active',statusLabel:np.status==='active'?'Active':'Winding Down',
          partner:np.partner||'TBD',qa:np.qa||'TBD',team:[],teamDisplay:np.teamSize?(np.teamSize+' needed'):'TBD',started:fmt,
          desc:np.desc||'',updated:'Just now',
          timeline:[{date:'Today',type:'milestone',title:'Project created in V-Brain',desc:'Project ingestion started. Files being processed for context generation.',source:'V-Brain system'}],
          health:{delivery:{pct:0,color:'var(--text-4)',label:'Awaiting kickoff',details:[]},utilisation:{pct:0,color:'var(--text-4)',label:'No team assigned yet',details:[]},comms:{pct:0,color:'var(--text-4)',label:'No client interactions yet',details:[]},risk:{value:'0',color:'var(--accent)',label:'No risks identified.',details:[]}},
          internalTeam:[{i:np.partner?np.partner.split(' ').map(w=>w[0]).join(''):'TB',n:np.partner||'TBD',r:'Partner'},{i:np.qa?np.qa.split(' ').map(w=>w[0]).join(''):'TB',n:np.qa||'TBD',r:'QA'}],
          clientTeam:[{i:'??',n:'Client contacts',r:'Pending ingestion'}],
          docs:(np.files||[]).map(f=>({n:f,sub:'Uploaded · Processing',c:'var(--text-4)'})),
          allocNeeds:[]
        };
        state.newProjOpen=false;state.newProjStep=0;state.newProjData={skills:[]};state.screen='dashboard';render();
        return;
      }
      state.newProjStep=step+1;render();
    };
    // Upload zone click simulation
    const uz=d.querySelector('#uploadZone');
    if(uz)uz.onclick=()=>{if(!np.files)np.files=[];const fakes=['SOW_Phase1_v3.pdf','Client_Brief_Jun2026.docx','Data_Schema_v2.xlsx','Kickoff_Meeting_Notes.pdf'];const pick=fakes.filter(f=>!(np.files||[]).includes(f)).slice(0,2);np.files=[...(np.files||[]),...pick];state.newProjData=np;render()};
    // Skill add
    const skillBtn=d.querySelector('#addSkillBtn');
    if(skillBtn)skillBtn.onclick=()=>{const inp=d.querySelector('#np-skillin');if(inp&&inp.value.trim()){if(!np.skills)np.skills=[];np.skills.push(inp.value.trim());state.newProjData=np;saveStep();render()}};
    const skIn=d.querySelector('#np-skillin');
    if(skIn)skIn.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();skillBtn?.click()}};
    // Skill remove
    d.querySelectorAll('.x[data-ski]').forEach(x=>{x.onclick=(e)=>{e.stopPropagation();np.skills.splice(parseInt(x.dataset.ski),1);state.newProjData=np;render()}});
  },0);
  return d}

/* BOOTSTRAP */
render();
</script>
</body>
</html>
