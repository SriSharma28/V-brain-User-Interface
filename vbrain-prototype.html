<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Brain — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   V-BRAIN PROTOTYPE — STYLES
   Design: dark teal palette with green-light accents, gradient cards
   Derived from page.tsx marketing site aesthetic
   ========================================================================== */
:root{
  --teal-black:#021E24;--teal-deep:#03272E;--teal-dark:#00363D;--teal-mid:#0F515C;
  --teal:#0C7878;--accent:#00A189;--green-light:#A9FDAC;--green-accent:#00E08E;
  --grey:#939196;--offwhite:#F7F3F5;
  --w70:rgba(247,243,245,.7);--w60:rgba(247,243,245,.6);--w55:rgba(247,243,245,.55);
  --w35:rgba(247,243,245,.35);--w20:rgba(247,243,245,.2);--w12:rgba(247,243,245,.12);
  --w08:rgba(247,243,245,.08);--w04:rgba(247,243,245,.04);--w02:rgba(247,243,245,.02);
  --grad-card:linear-gradient(160deg,rgba(15,81,92,.1) 0%,rgba(0,161,137,.04) 100%);
  --grad-bar:linear-gradient(90deg,var(--teal-mid),var(--accent),var(--green-light));
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--teal-black);color:var(--offwhite);min-height:100vh;overflow-x:hidden}
.screen{display:none;animation:fadeIn .3s ease;min-height:100vh}.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(169,253,172,.6)}50%{box-shadow:0 0 4px rgba(169,253,172,.3)}}

/* NAV */
.topnav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:13px 28px;background:rgba(2,30,36,.82);backdrop-filter:blur(24px);border-bottom:1px solid var(--w08)}
.topnav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;letter-spacing:-.02em;cursor:pointer}
.topnav-logo .v{color:var(--green-light)}
.brain-dot{width:8px;height:8px;border-radius:50%;background:var(--green-light);animation:pulse 2.5s infinite}
.topnav-right{display:flex;align-items:center;gap:14px}
.notif-btn{position:relative;width:36px;height:36px;border-radius:50%;border:1px solid var(--w12);background:var(--w04);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w60);transition:all .2s}
.notif-btn:hover{border-color:var(--green-light);color:var(--green-light)}
.notif-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--green-accent);color:var(--teal-black);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--teal-black);cursor:pointer}

/* LAYOUT */
.shell{max-width:1120px;margin:0 auto;padding:28px 28px 60px}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--w35);margin-bottom:14px}

/* SEARCH */
.dash-topbar{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.search-bar{flex:1;display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--w04);border:1px solid var(--w08);border-radius:40px;transition:border-color .2s}
.search-bar:focus-within{border-color:var(--green-light)}
.search-bar svg{color:var(--w35);flex-shrink:0}
.search-bar input{flex:1;border:none;outline:none;background:0 0;font-family:inherit;font-size:14px;color:var(--offwhite)}
.search-bar input::placeholder{color:var(--w35)}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--w12);background:var(--w04);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w55);transition:all .2s}
.icon-btn:hover{border-color:var(--w20);color:var(--offwhite)}
.add-btn{padding:0 18px;gap:6px;border-radius:40px;background:var(--green-accent);border:1px solid var(--green-accent);color:var(--teal-black);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;height:42px;cursor:pointer;transition:all .2s}
.add-btn:hover{background:var(--green-light);transform:translateY(-1px)}

/* PROJECT CARDS */
.p-card{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);margin-bottom:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.p-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;background:var(--grad-bar);opacity:0;transition:opacity .25s}
.p-card:hover{border-color:var(--w20);background:rgba(15,81,92,.15);transform:translateX(4px)}
.p-card:hover::before{opacity:1}
.p-card:hover .p-arrow{color:var(--green-light);transform:translateX(3px)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.badge-active{background:rgba(0,224,142,.12);color:var(--green-accent)}
.badge-winding{background:rgba(255,193,7,.1);color:#ffc107}
.badge-flagged{background:rgba(255,107,107,.1);color:#ff6b6b}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.p-info{flex:1;min-width:0}
.p-name{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:5px}
.p-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--w55);margin-bottom:7px}
.p-meta b{color:var(--w70);font-weight:500}
.p-desc{font-size:13px;line-height:1.55;color:var(--w35);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.p-updated{font-size:10px;color:var(--w35)}
.p-arrow{color:var(--w20);transition:all .25s}

/* SUITE */
.suite-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:32px}
.suite-tile{aspect-ratio:1.4;border-radius:var(--r-lg);border:1px solid var(--w08);background:var(--w02);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .3s;position:relative}
.suite-tile.on{border-color:var(--green-accent);background:rgba(0,224,142,.04)}
.suite-tile.on:hover{background:rgba(0,224,142,.08);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,224,142,.1)}
.suite-tile.off{opacity:.35;pointer-events:none}
.s-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.suite-tile.on .s-icon{background:rgba(0,224,142,.15);color:var(--green-accent)}
.suite-tile.off .s-icon{background:var(--w08);color:var(--w35)}
.s-name{font-size:13px;font-weight:600}
.suite-tile.on .s-name{color:var(--green-light)}
.suite-tile.off .s-name{color:var(--w55)}
.s-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;background:var(--w08);color:var(--w35)}

/* BACK BTN + HEADERS */
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--w12);background:var(--w04);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w55);transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--green-light);color:var(--green-light)}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.hdr-title{font-size:24px;font-weight:700;letter-spacing:-.03em}
.hdr-sub{font-size:14px;color:var(--w55);margin-bottom:24px;padding-left:50px}

/* TABS */
.tab-bar{display:flex;gap:4px;padding:4px;background:var(--w04);border-radius:40px;border:1px solid var(--w08);margin-bottom:28px;overflow-x:auto}
.tab{padding:10px 20px;border-radius:36px;font-size:13px;font-weight:500;color:var(--w55);cursor:pointer;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--offwhite);background:var(--w08)}
.tab.on{background:var(--teal-mid);color:var(--green-light);font-weight:600}
.tc{display:none;animation:slideUp .3s ease}.tc.on{display:block}

/* TIMELINE */
.tl-filters{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--w12);background:0 0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--w55);cursor:pointer;transition:all .2s}
.chip:hover{border-color:var(--w20);color:var(--offwhite)}
.chip.on{border-color:var(--green-accent);color:var(--green-accent);background:rgba(0,224,142,.06)}
.tl-item{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--w08)}
.tl-date{width:70px;flex-shrink:0;font-size:11px;color:var(--w35);padding-top:3px;text-align:right}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:5px}
.tl-line{width:1px;flex:1;background:var(--w08);margin-top:6px}
.dot-decision{background:var(--green-accent);box-shadow:0 0 8px rgba(0,224,142,.4)}
.dot-milestone{background:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,.4)}
.dot-risk{background:#ff6b6b;box-shadow:0 0 8px rgba(255,107,107,.4)}
.dot-update{background:var(--grey)}
.dot-personnel{background:#c084fc;box-shadow:0 0 8px rgba(192,132,252,.4)}
.tl-body{flex:1;min-width:0}
.tl-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.tag-decision{background:rgba(0,224,142,.12);color:var(--green-accent)}
.tag-milestone{background:rgba(96,165,250,.12);color:#60a5fa}
.tag-risk{background:rgba(255,107,107,.12);color:#ff6b6b}
.tag-update{background:var(--w08);color:var(--w55)}
.tag-personnel{background:rgba(192,132,252,.12);color:#c084fc}
.tl-title{font-size:14px;font-weight:600;margin-bottom:4px}
.tl-desc{font-size:13px;line-height:1.5;color:var(--w55)}
.tl-source{font-size:11px;color:var(--w35);margin-top:6px;font-style:italic}

/* BRIEFING */
.brief{background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.brief:hover{border-color:var(--w20)}
.brief-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;cursor:pointer}
.brief-left{display:flex;align-items:center;gap:12px}
.brief-num{width:28px;height:28px;border-radius:50%;background:var(--teal-mid);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--green-light)}
.brief-t{font-size:15px;font-weight:600}
.brief-st{font-size:12px;color:var(--w35);margin-top:1px}
.brief-chev{color:var(--w35);transition:transform .25s}
.brief.open .brief-chev{transform:rotate(180deg)}
.brief-bd{max-height:0;overflow:hidden;transition:max-height .35s ease}
.brief.open .brief-bd{max-height:600px}
.brief-inner{padding:0 22px 22px}

/* SKELETON */
.sk{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--w08) 0%,var(--w12) 50%,var(--w08) 100%);background-size:400px 12px;animation:shimmer 1.8s infinite linear;margin-bottom:10px}
.sk:last-child{margin-bottom:0}
.sk.w100{width:100%}.sk.w90{width:90%}.sk.w80{width:80%}.sk.w70{width:70%}.sk.w60{width:60%}.sk.w40{width:40%}
.sk.h20{height:20px;margin-bottom:14px}

/* HEALTH */
.h-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.h-card{padding:20px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg)}
.h-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:14px}
.h-bar-t{height:6px;border-radius:3px;background:var(--w08);margin-bottom:8px;overflow:hidden}
.h-bar-f{height:100%;border-radius:3px}
.h-val{font-size:24px;font-weight:700;letter-spacing:-.03em}
.h-sub{font-size:12px;color:var(--w35);margin-top:2px}
.h-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--w08)}
.h-drow{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.h-dl{color:var(--w35)}.h-dv{color:var(--w70);font-weight:500}

/* STAKEHOLDERS */
.st-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.st-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:12px}
.st-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--w02);border:1px solid var(--w08);border-radius:var(--r-md);margin-bottom:8px}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal-mid),var(--teal));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av-accent{background:linear-gradient(135deg,var(--accent),var(--green-accent))!important}
.av-blue{background:linear-gradient(135deg,#4a6fa5,#60a5fa)!important}
.st-name{font-size:13px;font-weight:600}
.st-role{font-size:11px;color:var(--w35)}

/* V-ALLOCATE */
.al-card{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 18px 26px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);margin-bottom:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.al-card:hover{border-color:var(--w20);background:rgba(15,81,92,.15);transform:translateX(4px)}
.al-bar{width:3px;height:100%;position:absolute;left:0;top:0;background:var(--grad-bar)}
.al-name{font-size:15px;font-weight:600}
.al-needs{font-size:12px;color:var(--w55);margin-top:2px}
.al-right{display:flex;align-items:center;gap:14px}
.al-deadline{font-size:11px;font-weight:600;color:var(--w55)}
.al-count{padding:4px 12px;border-radius:20px;background:rgba(255,107,107,.1);color:#ff6b6b;font-size:11px;font-weight:700}

/* FORECAST */
.f-toggle{display:flex;gap:2px;padding:3px;background:var(--w04);border:1px solid var(--w08);border-radius:30px}
.f-btn{padding:7px 16px;border-radius:26px;font-size:11px;font-weight:600;color:var(--w55);cursor:pointer;transition:all .2s}
.f-btn:hover{color:var(--offwhite)}.f-btn.on{background:var(--teal-mid);color:var(--green-light)}
.f-view{display:none;animation:slideUp .3s ease}.f-view.on{display:block}
.cap-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.cap-lbl{width:80px;font-size:11px;color:var(--w35);text-align:right;flex-shrink:0}
.cap-trk{flex:1;height:26px;border-radius:5px;background:var(--w04);position:relative;overflow:hidden}
.cap-supply{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--teal-mid),var(--accent));position:absolute;left:0;top:0}
.cap-demand{height:100%;border-radius:5px;background:rgba(255,107,107,.2);border-right:2px dashed #ff6b6b;position:absolute;left:0;top:0}
.cap-num{width:50px;font-size:11px;font-weight:600;color:var(--w55);text-align:right;flex-shrink:0}
.fh-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.fh-lbl{width:55px;font-size:11px;color:var(--w35);text-align:right;flex-shrink:0}
.fh-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.fh-bar{height:14px;border-radius:3px;position:relative}
.fh-bar span{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--offwhite);white-space:nowrap;opacity:.8}
.fh-fc{background:var(--accent)}.fh-ac{background:var(--green-light)}
.fh-d{font-size:12px;font-weight:700;width:28px;text-align:center;flex-shrink:0}
.fh-neg{color:#ff6b6b}.fh-pos{color:var(--green-accent)}.fh-ok{color:var(--w35)}

/* ALLOC TABLE */
.at-hd{display:grid;grid-template-columns:1.5fr 2fr 1.2fr .7fr .8fr;padding:12px 18px;border-bottom:1px solid var(--w08);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--w35)}
.at-row{display:grid;grid-template-columns:1.5fr 2fr 1.2fr .7fr .8fr;padding:14px 18px;border-bottom:1px solid var(--w04);font-size:13px;color:var(--w70);align-items:center;cursor:pointer;transition:background .2s}
.at-row:hover{background:var(--w04)}
.at-name{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--offwhite)}
.at-proj{font-size:12px}.at-role{font-size:12px;color:var(--w55)}.at-date{font-size:12px;color:var(--w55)}
.free{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.free-now{background:rgba(0,224,142,.15);color:var(--green-accent)}
.free-soon{background:rgba(0,161,137,.15);color:var(--accent)}
.free-weeks{background:var(--w08);color:var(--w55)}

/* PANELS (allocate detail) */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);padding:22px;max-height:calc(100vh - 260px);overflow-y:auto}
.panel-t{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--w35);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--w08)}
.rr{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--w04)}
.rr-l{font-size:12px;color:var(--w35)}.rr-v{font-size:13px;font-weight:500;text-align:right}
.stag{display:inline-block;padding:3px 10px;border-radius:20px;border:1px solid var(--w12);font-size:11px;font-weight:500;color:var(--w70);margin:2px 3px}

/* CONSULTANT CARD (in allocate supply panel) */
.cc{padding:16px;background:var(--w04);border:1px solid var(--w08);border-radius:var(--r-md);margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.cc:hover{border-color:var(--w20)}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cc-nr{display:flex;align-items:center;gap:10px}
.cc-name{font-size:14px;font-weight:600}
.cc-stat{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.cc-avail{background:rgba(0,224,142,.12);color:var(--green-accent)}
.cc-ending{background:rgba(255,193,7,.1);color:#ffc107}
.cc-fit{font-size:22px;font-weight:700;letter-spacing:-.02em}
.fit-hi{color:var(--green-accent)}.fit-md{color:#ffc107}
.fb-t{height:4px;border-radius:2px;background:var(--w08);margin-bottom:10px}
.fb-f{height:100%;border-radius:2px;background:var(--green-accent)}
.cc-reason{font-size:12px;line-height:1.5;color:var(--w55);font-style:italic;padding:8px 12px;background:var(--w02);border-radius:var(--r-sm);border-left:2px solid var(--green-accent)}
.cc-link{margin-top:8px;font-size:11px;color:var(--green-light);font-weight:500;display:flex;align-items:center;gap:4px}

/* PROFILE TABS */
.ptab{display:none;animation:slideUp .3s ease}.ptab.on{display:block}

/* OVERVIEW TAB */
.ov-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:var(--w70)}
.ov-int{padding:4px 12px;border-radius:20px;background:rgba(0,224,142,.06);border:1px solid rgba(0,224,142,.15);font-size:11px;color:var(--green-light);font-weight:500}
.ov-sk{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--w04)}
.ov-sn{font-size:12px;line-height:1.5;color:var(--w55);flex:1}

/* PAST PROJECTS */
.ph{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-md);margin-bottom:10px}
.ph:hover{border-color:var(--w20)}
.ph-dates{font-size:11px;color:var(--w35);margin-bottom:4px}

/* ==========================================================================
   RENDER ENGINE — State management + DOM helpers
   ========================================================================== */
let state = { screen:'dashboard', project:'atlas', consultant:'liam', fitModal:null };

function go(screen, opts) {
  return (e) => {
    if (e) e.stopPropagation();
    if (opts?.project) state.project = opts.project;
    if (opts?.consultant) state.consultant = opts.consultant;
    state.screen = screen;
    state.fitModal = null;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  };
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderNav());
  app.appendChild(renderNotifPanel());
  const screens = {dashboard:renderDashboard,project:renderProjectView,'alloc-list':renderAllocList,'alloc-detail':renderAllocDetail,profile:renderProfile};
  const fn = screens[state.screen] || renderDashboard;
  const s = fn();
  s.classList.add('screen','active');
  app.appendChild(s);
  if (state.fitModal) app.appendChild(renderFitModal(state.fitModal));
  document.addEventListener('click', () => { const np = document.getElementById('np'); if(np) np.classList.remove('on'); }, {once:true});
}

function mkAvatar(initials, extra) { return `<div class="av ${extra||''}">${initials}</div>`; }
function mkBadge(status) {
  const map = {active:'badge-active',flagged:'badge-flagged',winding:'badge-winding'};
  return `<span class="badge ${map[status]||''}"><span class="badge-dot"></span> ${({active:'Active',flagged:'Flagged',winding:'Winding Down'})[status]||status}</span>`;
}
function mkSkeleton() { return `<div class="sk h20 w60"></div><div class="sk w100"></div><div class="sk w90"></div><div class="sk w80"></div><div style="height:12px"></div><div class="sk w70"></div><div class="sk w100"></div><div class="sk w60"></div>`; }
function fitColor(v) { return v >= 80 ? 'var(--green-accent)' : v >= 65 ? '#ffc107' : '#ff6b6b'; }
function fitClass(v) { return v >= 80 ? 'fit-hi' : 'fit-md'; }

function renderDashboard() {
  const s = document.createElement('div');
  const shell = document.createElement('div');
  shell.className = 'shell';

  // Search bar
  shell.innerHTML = `<div class="dash-topbar"><div class="search-bar">${ICO.search}<input type="text" placeholder="Search projects by name, description, client…" id="dashQ"></div><div class="icon-btn">${ICO.archive}</div><div class="add-btn">${ICO.plus} New project</div></div><div class="section-label">Active Projects</div><div id="pList"></div>`;

  // Suite grid
  shell.innerHTML += `<div class="section-label" style="margin-top:36px">V-Brain Suite</div><div class="suite-grid"><div class="suite-tile on" id="goAlloc"><div class="s-icon">${ICO.users}</div><div class="s-name">V-Allocate</div></div><div class="suite-tile off"><span class="s-badge">Soon</span><div class="s-icon">${ICO.pulse}</div><div class="s-name">V-Insight</div></div><div class="suite-tile off"><span class="s-badge">Soon</span><div class="s-icon">${ICO.book}</div><div class="s-name">V-Develop</div></div><div class="suite-tile off"><span class="s-badge">Soon</span><div class="s-icon">${ICO.grid}</div><div class="s-name">V-Deliver</div></div></div>`;

  s.appendChild(shell);

  setTimeout(()=>{
    document.getElementById('goAlloc').onclick = go('alloc-list');
    const list = document.getElementById('pList');
    function drawProjects(q) {
      list.innerHTML = '';
      const query = (q||'').toLowerCase();
      let found = false;
      Object.entries(DATA.projects).forEach(([pid, p]) => {
        if (query && !p.name.toLowerCase().includes(query) && !p.desc.toLowerCase().includes(query)) return;
        found = true;
        const card = document.createElement('div');
        card.className = 'p-card';
        card.onclick = go('project',{project:pid});
        card.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;align-items:flex-start">${mkBadge(p.status)}</div><div class="p-info"><div class="p-name">${p.name}</div><div class="p-meta"><span><b>Partner:</b> ${p.partner}</span><span><b>QA:</b> ${p.qa}</span><span><b>Team:</b> ${p.teamDisplay}</span></div><div class="p-desc">${p.desc}</div></div><div class="p-right"><div class="p-updated">${p.updated}</div><span class="p-arrow">${ICO.arrow}</span></div>`;
        list.appendChild(card);
      });
      if (!found) list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--w35)">No projects match your search.</div>';
    }
    drawProjects('');
    document.getElementById('dashQ').oninput = (e) => drawProjects(e.target.value);
  },0);

  return s;
}

function renderProjectView() {

  shell.className = 'shell';

  // Header

  const tabNames = ['Timeline','Get Up to Speed','Project Health','Stakeholders','Knowledge Base'];
  const tabIds = ['tl','gus','health','stak','kb'];
  let tabBarHtml = '<div class="tab-bar">';
  tabNames.forEach((t,i) => { tabBarHtml += `<div class="tab${i===0?' on':''}" data-tab="${tabIds[i]}">${t}</div>`; });
  tabBarHtml += '</div>';
  shell.innerHTML += tabBarHtml;

  // ── Timeline tab ──
  const filterTypes = [{k:'all',l:'All'},{k:'decision',l:'Decisions'},{k:'milestone',l:'Milestones'},{k:'risk',l:'Risks'},{k:'update',l:'Updates'},{k:'personnel',l:'Personnel'}];
  let tlHtml = `<div class="tc on" id="tc-tl"><div class="tl-filters" id="tlFilters">`;
  filterTypes.forEach(f => { tlHtml += `<div class="chip${f.k==='all'?' on':''}" data-filter="${f.k}">${f.l}</div>`; });
  tlHtml += `</div><div id="tlList"></div></div>`;
  shell.innerHTML += tlHtml;

  // ── Get Up to Speed ──
  const briefs = [{n:1,t:'What is this project?',sub:'Client, scope, objectives, commercial structure'},{n:2,t:'What\'s happened so far?',sub:'Key events, synthesised narrative'},{n:3,t:'What do I need to do?',sub:'Role-specific context, immediate actions, contacts'}];
  let gusHtml = '<div class="tc" id="tc-gus">';
  briefs.forEach((b,i) => {
    gusHtml += `<div class="brief${i===0?' open':''}"><div class="brief-hd"><div class="brief-left"><div class="brief-num">${b.n}</div><div><div class="brief-t">${b.t}</div><div class="brief-st">${b.sub}</div></div></div><span class="brief-chev">${ICO.chev}</span></div><div class="brief-bd"><div class="brief-inner">${mkSkeleton()}</div></div></div>`;
  });
  gusHtml += '</div>';
  shell.innerHTML += gusHtml;

  // ── Health tab ──
  function healthCard(label, data, isRisk) {
    let det = '';
    if (data.details) det = '<div class="h-detail">' + data.details.map(d=>`<div class="h-drow"><span class="h-dl">${d.l}</span><span class="h-dv">${d.v}</span></div>`).join('') + '</div>';
    if (isRisk) return `<div class="h-card"><div class="h-label">${label}</div><div style="display:flex;align-items:center;gap:10px;margin-top:8px"><div class="h-val" style="color:${data.color}">${data.value}</div><div class="h-sub" style="margin:0">${data.label}</div></div>${det}</div>`;
    return `<div class="h-card"><div class="h-label">${label}</div><div class="h-bar-t"><div class="h-bar-f" style="width:${data.pct}%;background:${data.color}"></div></div><div class="h-val" style="color:${data.color}">${data.pct}%</div><div class="h-sub">${data.label}</div>${det}</div>`;
  }
  shell.innerHTML += `<div class="tc" id="tc-health"><div class="h-grid">${healthCard('Delivery Against Plan',p.health.delivery)}${healthCard('Team Utilisation',p.health.utilisation)}${healthCard('Client Communication',p.health.comms)}${healthCard('Risk Signals',p.health.risk,true)}</div></div>`;

  // ── Stakeholders ──
  shell.innerHTML += `<div class="tc" id="tc-stak"><div class="st-grid"><div><div class="st-label">Internal Team</div>${p.internalTeam.map(s=>`<div class="st-card">${mkAvatar(s.i,s.accent?'av-accent':'')} <div><div class="st-name">${s.n}</div><div class="st-role">${s.r}</div></div></div>`).join('')}</div><div><div class="st-label">Client Side</div>${p.clientTeam.map(s=>`<div class="st-card">${mkAvatar(s.i,'av-blue')} <div><div class="st-name">${s.n}</div><div class="st-role">${s.r}</div></div></div>`).join('')}<div style="margin-top:16px;padding:12px 16px;border-radius:var(--r-md);background:var(--w04);border:1px dashed var(--w12)"><div style="font-size:11px;color:var(--w35);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Communication Pattern</div><div style="width:100%;height:80px;border-radius:8px;background:linear-gradient(90deg,var(--w04) 0%,var(--w08) 50%,var(--w04) 100%);background-size:400px 80px;animation:shimmer 1.8s infinite linear"></div></div></div></div></div>`;

  // ── Knowledge Base ──
  shell.innerHTML += `<div class="tc" id="tc-kb"><div class="section-label">Key Documents</div><div style="display:flex;flex-direction:column;gap:8px">${p.docs.map(d=>`<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--w02);border:1px solid var(--w08);border-radius:var(--r-md);cursor:pointer;transition:border-color .2s" onmouseover="this.style.borderColor='var(--w20)'" onmouseout="this.style.borderColor='var(--w08)'">${ICO.doc.replace('COLOUR',d.c)}<div style="flex:1"><div style="font-size:13px;font-weight:600">${d.n}</div><div style="font-size:11px;color:var(--w35)">${d.sub}</div></div></div>`).join('')}</div></div>`;

  s.appendChild(shell);

  // Wire events
  setTimeout(()=>{
    document.getElementById('pBack').onclick = go('dashboard');

    shell.querySelectorAll('.tab').forEach(tb => {
      tb.onclick = () => {
        shell.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
        tb.classList.add('on');
        shell.querySelectorAll('.tc').forEach(x=>x.classList.remove('on'));
        document.getElementById('tc-'+tb.dataset.tab)?.classList.add('on');
      };
    });
    // Briefing toggles
    shell.querySelectorAll('.brief-hd').forEach(h => { h.onclick = () => h.closest('.brief').classList.toggle('open'); });
    // Timeline rendering + filtering
    function drawTimeline(filter) {
      const el = document.getElementById('tlList');
      el.innerHTML = '';
      const items = filter === 'all' ? p.timeline : p.timeline.filter(e=>e.type===filter);
      items.forEach((ev,i) => {
        el.innerHTML += `<div class="tl-item"><div class="tl-date">${ev.date}</div><div class="tl-dot-col"><div class="tl-dot dot-${ev.type}"></div>${i<items.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-body"><span class="tl-tag tag-${ev.type}">${ev.type}</span><div class="tl-title">${ev.title}</div><div class="tl-desc">${ev.desc}</div><div class="tl-source">Inferred from: ${ev.source}</div></div></div>`;
      });
      if (!items.length) el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--w35)">No events of this type.</div>';
    }
    drawTimeline('all');
    document.getElementById('tlFilters').querySelectorAll('.chip').forEach(c => {
      c.onclick = () => {
        document.getElementById('tlFilters').querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
        c.classList.add('on');
        drawTimeline(c.dataset.filter);
      };
    });
  },0);

  return s;
}

  // ── Current Allocations Table ──

      };

    const tbody = document.getElementById('allocRows');
    Object.entries(DATA.consultants).forEach(([cid,c]) => {
      const row = document.createElement('div');
      row.className = 'at-row';
      row.onclick = go('profile',{consultant:cid});

      tbody.appendChild(row);
    });
  },0);

  return s;
}

/* ==========================================================================
   SCREEN 4: V-ALLOCATE DETAIL (two-panel: demand + supply)
   ========================================================================== */
function renderAllocDetail() {
  const p = DATA.projects[state.project];
  if (!p || !p.allocNeeds.length) return document.createElement('div');
  const s = document.createElement('div');
  const shell = document.createElement('div');
  shell.className = 'shell';

  shell.innerHTML = `<div class="hdr"><div class="back-btn" id="adBack">${ICO.back}</div><div class="hdr-title" style="font-size:20px">${p.name.split('—')[0]}— Allocation</div><div class="al-count" style="margin-left:10px">${p.allocNeeds.length} role${p.allocNeeds.length>1?'s':''}</div></div><div class="hdr-sub">${p.allocNeeds.map(n=>n.role).join(' | ')}</div>`;

  // ── Demand panel ──
  let demandHtml = '<div class="panel"><div class="panel-t">Project Requirements</div>';
  p.allocNeeds.forEach((need,i) => {
    if (i > 0) demandHtml += '<div style="height:1px;background:var(--w08);margin:16px 0"></div>';
    demandHtml += `<div><div style="font-size:13px;font-weight:600;color:var(--green-light);margin-bottom:12px">Role ${i+1}: ${need.role}</div>`;
    demandHtml += `<div class="rr"><span class="rr-l">Seniority</span><span class="rr-v">${need.seniority}</span></div>`;
    demandHtml += `<div class="rr"><span class="rr-l">Duration</span><span class="rr-v">${need.duration}</span></div>`;
    demandHtml += `<div class="rr"><span class="rr-l">Skills</span><span class="rr-v">${need.skills.map(sk=>`<span class="stag">${sk}</span>`).join('')}</span></div>`;
    demandHtml += `<div class="rr"><span class="rr-l">Persona</span><span class="rr-v">${need.persona}</span></div>`;
    demandHtml += `<div class="rr"><span class="rr-l">Partner Notes</span><span class="rr-v" style="color:var(--w55);font-style:italic;font-size:12px">${need.notes}</span></div></div>`;
  });
  demandHtml += '</div>';

  // ── Supply panel ──
  let supplyHtml = '<div class="panel"><div class="panel-t">Recommended Consultants</div>';
  p.allocNeeds.forEach((need,ni) => {
    if (ni > 0) supplyHtml += '<div style="height:1px;background:var(--w08);margin:18px 0"></div>';
    supplyHtml += `<div style="font-size:11px;font-weight:600;color:var(--w35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">For: ${need.role}</div>`;
    need.recs.forEach(rec => {
      const c = DATA.consultants[rec.id];
      if (!c) return;
      const availLabel = c.freeIn === 'Now' ? 'Available now' : `Ending in ${c.freeIn}`;
      const availCls = c.freeBadge === 'free-now' ? 'cc-avail' : 'cc-ending';
      supplyHtml += `<div class="cc" data-cid="${rec.id}" data-ni="${ni}" data-ri="${need.recs.indexOf(rec)}"><div class="cc-top"><div class="cc-nr">${mkAvatar(c.initials,'av-accent')}<div><div class="cc-name">${c.name}</div><span class="cc-stat ${availCls}">${availLabel}</span></div></div><div class="cc-fit ${fitClass(rec.fit)}">${rec.fit}%</div></div><div class="fb-t"><div class="fb-f" style="width:${rec.fit}%;background:${fitColor(rec.fit)}"></div></div><div class="cc-reason">${rec.reasoning}</div><div class="cc-link" data-fitopen="1">View full breakdown →</div></div>`;
    });
  });
  supplyHtml += '</div>';

  shell.innerHTML += `<div class="panels">${demandHtml}${supplyHtml}</div>`;
  s.appendChild(shell);

  setTimeout(()=>{
    document.getElementById('adBack').onclick = go('alloc-list');
    // Consultant card click → profile
    shell.querySelectorAll('.cc').forEach(card => {
      card.onclick = (e) => {
        if (e.target.closest('[data-fitopen]')) {
          // Open fit modal
          const ni = parseInt(card.dataset.ni);
          const ri = parseInt(card.dataset.ri);
          const need = p.allocNeeds[ni];
          const rec = need.recs[ri];
          state.fitModal = { rec, need, consultant: DATA.consultants[rec.id] };
          render();
          return;
        }
        go('profile',{consultant:card.dataset.cid})();
      };
    });
  },0);

  return s;
}

/* ==========================================================================

  // Bio
  ovHtml += `<div style="padding:18px 22px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);margin-bottom:16px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:10px">Who They Are</div><div style="font-size:13px;line-height:1.6;color:var(--w70);margin-bottom:8px">${c.bio}</div><div style="font-size:13px;line-height:1.6;color:var(--w55)">${c.bio2}</div></div>`;

  // Interests
  ovHtml += `<div style="padding:16px 22px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);margin-bottom:16px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:10px">Interests & Drivers</div><div style="display:flex;flex-wrap:wrap;gap:6px">${c.interests.map(i=>`<span class="ov-int">${i}</span>`).join('')}</div></div>`;

  // Last project summary
  if (lastProj) {
    ovHtml += `<div style="padding:18px 22px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg);margin-bottom:16px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:10px">Last Project</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">${lastProj.name}</div><div style="font-size:12px;color:var(--w55);margin-bottom:8px">${lastProj.role} · ${lastProj.dates}</div><div style="font-size:13px;line-height:1.55;color:var(--w70)">${lastProj.summary}</div><div style="display:flex;gap:20px;margin-top:10px;padding-top:10px;border-top:1px solid var(--w08)">${[{l:'Fit',v:lastProj.fit+'%'},{l:'Client',v:lastProj.clientRating+'/5'},{l:'Satisfaction',v:lastProj.satisfaction+'/5'}].map(m=>`<div><span style="font-size:10px;color:var(--w35);text-transform:uppercase">${m.l}</span> <span style="font-size:13px;font-weight:600">${m.v}</span></div>`).join('')}</div></div>`;
  }

  // Top skills (summary)
  ovHtml += `<div style="padding:18px 22px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg)"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:12px">Top Skills</div>${c.topSkills.map(sk=>`<div class="ov-sk"><span class="stag" style="border-color:var(--${sk.color});color:var(--${sk.color})">${sk.name}</span><span class="ov-sn">${sk.note}</span></div>`).join('')}</div>`;
  ovHtml += '</div>';
  shell.innerHTML += ovHtml;

  // ── Skills & Persona Tab ──
  let skpHtml = '<div class="ptab" id="pt-skp">';

  skpHtml += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:16px">Skills · Detailed Evidence</div>';

    skpHtml += `<div class="skd"><div class="skd-hd"><span class="stag" style="border-color:var(--${sk.color});color:var(--${sk.color})">${sk.name}</span></div>`;
    if (sk.evidence) {
      skpHtml += '<div class="skd-ev">';
      sk.evidence.forEach(ev => {
        skpHtml += `<div class="skd-ei"><div class="skd-ep">${ev.project}</div><div class="skd-ed">${ev.desc}</div></div>`;
      });
      skpHtml += '</div>';
    } else if (sk.note) {
      skpHtml += `<div style="font-size:12px;color:var(--w55);padding-left:12px;border-left:2px solid var(--w08);margin-left:4px">${sk.note}</div>`;
    }
    skpHtml += '</div>';
  });

  // Persona
  skpHtml += '<div style="height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.2;margin:28px 0"></div>';
  skpHtml += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:16px">Persona Summary</div>';
  Object.entries(c.persona).forEach(([k,v]) => {
    skpHtml += `<div class="pr"><span class="pr-l">${({style:'Working Style',comms:'Communication',stakeholder:'Stakeholder Mgmt',team:'Team Dynamic',ramp:'Ramp-up Speed'})[k]||k}</span><span class="pr-v">${v}</span></div>`;
  });

  // Persona evidence
  if (c.personaEvidence && c.personaEvidence.length) {

      pe.items.forEach(it => {
        skpHtml += `<div class="pe-item"><div class="pe-src">${it.source}</div><div class="pe-det">${it.detail}</div></div>`;
      });
      skpHtml += '</div></div>';

  skpHtml += '</div>';
  shell.innerHTML += skpHtml;

  // ── Past Projects Tab ──

  c.projects.forEach(proj => {
    histHtml += `<div class="ph"><div><div class="ph-dates">${proj.dates}</div><div class="ph-name">${proj.name}</div><div class="ph-role">${proj.role}</div><div style="font-size:12px;line-height:1.5;color:var(--w55);margin-top:8px">${proj.summary}</div></div><div class="ph-right"><div class="ph-m"><span class="ph-ml">Fit</span><span class="ph-mv" style="color:${fitColor(proj.fit)}">${proj.fit}%</span></div><div class="ph-m"><span class="ph-ml">Client</span><span class="ph-mv">${proj.clientRating}</span></div><div class="ph-m"><span class="ph-ml">Sat.</span><span class="ph-mv">${proj.satisfaction}</span></div></div></div>`;

    satHtml += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;height:${h}px;border-radius:4px;background:${fitColor(proj.fit)};opacity:.8"></div><div style="font-size:9px;color:var(--w35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px">${proj.name.split('—')[0].trim()}</div></div>`;

  satHtml += '</div></div>';
  satHtml += `<div style="padding:22px;background:var(--grad-card);border:1px solid var(--w08);border-radius:var(--r-lg)"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:10px">Engagement Signals</div><div style="display:flex;flex-direction:column;gap:8px"><div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--w04)"><span style="color:var(--w35)">Satisfaction trend</span><span style="font-weight:500">${c.satisfaction >= 4 ? '↑ Positive' : c.satisfaction >= 3.5 ? '→ Stable' : '↓ Watch'}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--w04)"><span style="color:var(--w35)">Career alignment</span><span style="font-weight:500">${c.careerAlign}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0"><span style="color:var(--w35)">Career note</span><span style="font-weight:500;text-align:right;max-width:200px;font-size:11px;color:var(--w55)">${c.careerNote}</span></div></div></div></div>`;

  // Allocation history (from projects)
  satHtml += `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:12px">Allocation Outcomes</div>`;
  c.projects.forEach(proj => {
    satHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--w02);border:1px solid var(--w08);border-radius:var(--r-md);margin-bottom:8px"><div><div style="font-size:13px;font-weight:600">${proj.name.split('—')[0].trim()}</div><div style="font-size:11px;color:var(--w35)">${proj.dates} · ${proj.role}</div></div><div style="display:flex;gap:16px;align-items:center"><div style="text-align:center"><div style="font-size:10px;color:var(--w35)">Fit</div><div style="font-size:14px;font-weight:700;color:${fitColor(proj.fit)}">${proj.fit}%</div></div><div style="text-align:center"><div style="font-size:10px;color:var(--w35)">Client</div><div style="font-size:14px;font-weight:700">${proj.clientRating}</div></div><div style="text-align:center"><div style="font-size:10px;color:var(--w35)">Sat</div><div style="font-size:14px;font-weight:700">${proj.satisfaction}</div></div></div></div>`;
  });
  satHtml += '</div>';
  shell.innerHTML += satHtml;

  s.appendChild(shell);

  setTimeout(()=>{
    document.getElementById('prBack').onclick = go('alloc-list');
    // Tab switching
    shell.querySelectorAll('.tab').forEach(tb => {
      tb.onclick = () => {
        shell.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
        tb.classList.add('on');
        shell.querySelectorAll('.ptab').forEach(x=>x.classList.remove('on'));
        document.getElementById('pt-'+tb.dataset.ptab)?.classList.add('on');
      };
    });
  },0);

  return s;
}

/* ==========================================================================
   FIT BREAKDOWN MODAL
   Opens from consultant cards in V-Allocate detail.
   Data shape: { rec (from allocNeeds.recs), need, consultant }
   ========================================================================== */
function renderFitModal(data) {
  const {rec, need, consultant: c} = data;
  const fb = rec.fitBreakdown;
  if (!fb) return document.createElement('div');

  const bg = document.createElement('div');
  bg.className = 'fm-bg on';
  bg.onclick = (e) => { if (e.target === bg) { state.fitModal = null; render(); }};

  let html = `<div class="fm"><div class="fm-hdr"><div class="fm-btn" id="fmBack">← Return to project</div><div class="fm-btn go" id="fmGo">Go to consultant →</div></div><div class="fm-body">`;

  // Identity row
  html += `<div class="fm-id"><div style="display:flex;align-items:center;gap:12px">${mkAvatar(c.initials,'av-accent')}<div><div style="font-size:18px;font-weight:700">${c.name}</div><div style="font-size:13px;color:var(--w55)">${c.seniority} · ${c.specialty}</div></div></div><div class="cc-fit ${fitClass(rec.fit)}" style="font-size:28px">${rec.fit}%</div></div>`;

  // Role context
  html += `<div class="fm-ctx"><strong>Role:</strong>&nbsp;${need.role}&nbsp;·&nbsp;${need.seniority}&nbsp;·&nbsp;${need.duration}</div>`;

  // ── Dimensions ──
  html += '<div class="fd">';

  // 1. Skills
  html += `<div class="fd-card"><div class="fd-hd"><div class="fd-t">Skills Match</div><div class="fd-s" style="color:${fitColor(fb.skills.score)}">${fb.skills.score}%</div></div><div class="fd-det">${fb.skills.matches.map(m=>`<div class="fm-row"><div class="fm-ml">${m.skill}</div><div class="fm-ms ${({strong:'fm-strong',ok:'fm-ok',weak:'fm-weak'})[m.status]}">${m.status}</div><div class="fm-ev">${m.evidence}</div></div>`).join('')}</div></div>`;

  // 2. Persona
  html += `<div class="fd-card"><div class="fd-hd"><div class="fd-t">Persona Match</div><div class="fd-s" style="color:${fitColor(fb.persona.score)}">${fb.persona.score}%</div></div><div class="fd-det">${fb.persona.matches.map(m=>`<div class="fm-row"><div class="fm-ml">${m.trait}</div><div class="fm-ms ${({strong:'fm-strong',ok:'fm-ok',weak:'fm-weak'})[m.status]}">${m.status}</div><div class="fm-ev">${m.evidence}</div></div>`).join('')}</div></div>`;

  // 3. Availability
  html += `<div class="fd-card"><div class="fd-hd"><div class="fd-t">Availability</div><div class="fd-s" style="color:${fitColor(fb.availability.score)}">${fb.availability.score}%</div></div><div class="fm-ag">${fb.availability.details.map(d=>`<div class="fm-ai"><div class="fm-al">${d.l}</div><div class="fm-av">${d.v}</div></div>`).join('')}</div></div>`;

  // 4. Experience
  html += `<div class="fd-card"><div class="fd-hd"><div class="fd-t">Experience & Seniority</div><div class="fd-s" style="color:${fitColor(fb.experience.score)}">${fb.experience.score}%</div></div><div class="fd-det">${fb.experience.matches.map(m=>`<div class="fm-row"><div class="fm-ml">${m.trait}</div><div class="fm-ms ${({strong:'fm-strong',ok:'fm-ok',weak:'fm-weak'})[m.status]}">${m.status}</div><div class="fm-ev">${m.evidence}</div></div>`).join('')}</div></div>`;

  // 5. Semantic
  html += `<div class="fd-card"><div class="fd-hd"><div class="fd-t">Semantic & Contextual</div><div class="fd-s" style="color:${fitColor(fb.semantic.score)}">${fb.semantic.score}%</div></div><div class="fd-det">${fb.semantic.matches.map(m=>`<div class="fm-row"><div class="fm-ml">${m.trait}</div><div class="fm-ms ${({strong:'fm-strong',ok:'fm-ok',weak:'fm-weak'})[m.status]}">${m.status}</div><div class="fm-ev">${m.evidence}</div></div>`).join('')}</div></div>`;

  html += '</div>'; // end .fd

  // V-Brain reasoning
  if (rec.reasoning_full) {
    html += `<div class="fm-reason"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--green-light);margin-bottom:8px">V-Brain Reasoning</div><div style="font-size:13px;line-height:1.6;color:var(--w70)">${rec.reasoning_full}</div></div>`;
  }

  // Considerations
  if (rec.considerations && rec.considerations.length) {
    html += `<div class="fm-cons"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--w35);margin-bottom:8px">Considerations</div>${rec.considerations.map(c=>`<div class="fm-ci">${ICO.warn} <span>${c}</span></div>`).join('')}</div>`;
  }

  html += '</div></div>'; // end .fm-body, .fm
  bg.innerHTML = html;

  setTimeout(()=>{
    document.getElementById('fmBack').onclick = () => { state.fitModal = null; render(); };
    document.getElementById('fmGo').onclick = go('profile',{consultant:rec.id});
  },0);

  return bg;
}

/* ==========================================================================
   BOOTSTRAP
   ========================================================================== */
render();
</script>
</body>
</html>
